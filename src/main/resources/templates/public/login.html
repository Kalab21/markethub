<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>Sign In</title>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-logo"><span>Market</span>Hub</div>
                <p>Welcome back — sign in to continue</p>
            </div>
            <div class="auth-card-body">
                <div th:if="${param.error}" class="alert alert-danger mb-3" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>Invalid username or password.
                    <button type="button" class="btn-close float-end" data-bs-dismiss="alert" style="font-size:0.7rem;"></button>
                </div>
                <div th:if="${param.logout}" class="alert alert-success mb-3" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i>You have been signed out.
                    <button type="button" class="btn-close float-end" data-bs-dismiss="alert" style="font-size:0.7rem;"></button>
                </div>
                <div th:if="${param.registered}" class="alert alert-success mb-3" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i>Account created — you can now sign in.
                    <button type="button" class="btn-close float-end" data-bs-dismiss="alert" style="font-size:0.7rem;"></button>
                </div>

                <form name="formLogin" th:action="@{/onlinemarket/public/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="icon-input-wrap">
                            <i class="fa-regular fa-user icon-input-icon"></i>
                            <input id="username" name="username" type="text"
                                   class="form-control icon-input-field"
                                   placeholder="Enter your username" autofocus/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="icon-input-wrap">
                            <i class="fa-solid fa-lock icon-input-icon"></i>
                            <input id="password" name="password" type="password"
                                   class="form-control icon-input-field"
                                   placeholder="Enter your password"/>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
                        </button>
                    </div>
                </form>
            </div>
            <div class="auth-card-footer">
                Don't have an account?
                <a th:href="@{/onlinemarket/public/signup}" class="text-primary fw-semibold">Create one free</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
