<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>Create Account</title>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-wrapper" style="align-items:flex-start; padding-top:3rem; padding-bottom:3rem;">
        <div class="auth-card" style="max-width:480px;">
            <div class="auth-card-header">
                <div class="auth-logo"><span>Market</span>Hub</div>
                <p>Create your free account</p>
            </div>
            <div class="auth-card-body">
                <div th:if="${errorMessage}" class="alert alert-danger mb-3" role="alert">
                    <i class="fa-solid fa-circle-exclamation me-2"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close float-end" data-bs-dismiss="alert" style="font-size:0.7rem;"></button>
                </div>

                <form th:action="@{/onlinemarket/public/signup}" th:object="${signUp}" method="post">
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="firstName" class="form-label">First Name</label>
                            <input id="firstName" th:field="*{firstName}" type="text" placeholder="First"
                                   class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-6">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input id="lastName" th:field="*{lastName}" type="text" placeholder="Last"
                                   class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{lastName}"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="userName" class="form-label">Username</label>
                        <div class="icon-input-wrap">
                            <i class="fa-regular fa-user icon-input-icon"></i>
                            <input id="userName" th:field="*{userName}" type="text" placeholder="Choose a username"
                                   class="form-control icon-input-field"
                                   th:classappend="${#fields.hasErrors('userName')} ? 'is-invalid'"/>
                        </div>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="icon-input-wrap">
                            <i class="fa-regular fa-envelope icon-input-icon"></i>
                            <input id="email" th:field="*{email}" type="email" placeholder="you@example.com"
                                   class="form-control icon-input-field"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                        </div>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="icon-input-wrap">
                            <i class="fa-solid fa-lock icon-input-icon"></i>
                            <input id="password" th:field="*{password}" type="password" placeholder="Create a password"
                                   class="form-control icon-input-field"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"/>
                        </div>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    <div class="mb-4">
                        <label for="role" class="form-label">Account Type</label>
                        <select id="role" th:field="*{role}" class="form-select"
                                th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                            <option value="">— Select account type —</option>
                            <option value="BUYER">Buyer — shop &amp; purchase products</option>
                            <option value="SELLER">Seller — list &amp; sell products (requires admin approval)</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{role}"></div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fa-solid fa-user-plus me-2"></i>Create Account
                        </button>
                    </div>
                </form>
            </div>
            <div class="auth-card-footer">
                Already have an account?
                <a th:href="@{/onlinemarket/public/login}" class="text-primary fw-semibold">Sign In</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
