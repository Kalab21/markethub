<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>MarketHub — Admin Dashboard</title>
</head>
<body>
<div layout:fragment="content" class="container" style="padding-top:2em;">
    <h3>Admin Dashboard</h3>
    <hr/>
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card border-warning h-100">
                <div class="card-header bg-warning text-dark">Seller Management</div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text">Review and approve seller accounts.</p>
                    <a href="/onlinemarket/secured/services/users/sellers"
                       class="btn btn-warning mt-auto">Manage Sellers</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card border-danger h-100">
                <div class="card-header bg-danger text-white">User Management</div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text">View and manage all registered users.</p>
                    <a href="/onlinemarket/secured/services/admin/usrmgmt/list"
                       class="btn btn-danger mt-auto">Manage Users</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card border-secondary h-100">
                <div class="card-header bg-secondary text-white">Product Catalog</div>
                <div class="card-body d-flex flex-column">
                    <p class="card-text">Browse all products listed on the platform.</p>
                    <a href="/onlinemarket/secured/services/products/list"
                       class="btn btn-secondary mt-auto">View Products</a>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="footer"></th:block>
</body>
</html>
