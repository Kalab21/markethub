<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="MarketHub — Buy, sell, and manage products on one platform.">
    <meta name="author" content="K.Kalabe">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">

    <!-- Bootstrap 5.3 (self-hosted) -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

    <!-- Font Awesome 6 Free (self-hosted) -->
    <link rel="stylesheet" th:href="@{/css/fa-all.min.css}">

    <!-- Custom styles -->
    <link rel="stylesheet" type="text/css" th:href="@{/css/master.css}">

    <title layout:title-pattern="$CONTENT_TITLE — MarketHub">MarketHub</title>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="page-wrapper">
        <div layout:fragment="content"></div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Bootstrap 5.3 Bundle (self-hosted) -->
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
